<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendong Impact</title>

    <link rel="stylesheet" href="account.css">
    
</head>

<body>

    <div class="overlay">

        <div class="settings-container">
        <h1 class="title">Account Settings</h1>
        <hr class="divider">

        <form class="settings-form" id="update-account">
            <div class="input-group">
                <label>Username</label>
                <input type="username" name="username" id="username">
            </div>

            <div class="toggle-group">
                <label>Change Password</label>
                <label class="switch">
                    <input type="checkbox" id="change-password-button" value="change" name="change-password">
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="change-password-container">
                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" name="password">
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm-password">
                </div>
            </div>
            

            <button type="submit" class="update-btn">Update Account</button>
        </form>

    </div>

    <script>
        const changePasswordButton = document.getElementById('change-password-button');
        const changePasswordContainer = document.querySelector('.change-password-container');
        const updateAccountForm = document.getElementById('update-account');
        const usernameField = document.getElementById('username');
        
        changePasswordButton.addEventListener('change', showChangePassword);
        updateAccountForm.addEventListener('submit', updateAccount);

        getUsername();
        async function getUsername() {
            const response = await fetch('get_account.php', {method: 'POST'});
            const account = await response.json();

            usernameField.value = account.username;
        }

        function showChangePassword() {
            if(changePasswordButton.checked) {
                changePasswordContainer.style.display = 'block';
            }
            else {
                changePasswordContainer.style.display = 'none';
            };
        }


        async function updateAccount(e) {
            e.preventDefault();
            const formData = new FormData(this);

            const response = await fetch('update_account.php', {
                method: 'POST',
                body: formData
            })
            const data = await response.json();

            alert(data.message);

        }


    </script>

</body>
</html>
