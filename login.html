<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration</title>
    <link rel="stylesheet" href="modal.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background-image: url(Assets/login-background.png);
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            background-size: cover;
            background-position: 100% 50%;
        }
        .form-container {
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(50px);
            padding: 30px;
            border-radius: 20px;
            box-shadow:
                0 8px 32px rgba(0,0,0,0.15),
                inset 0 1px 1px rgba(255,255,255,0.4);
            width: 350px;
        }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #555; }
        input {
            width: 100%;
            padding: 10px;
            border: none;
            outline: none;
            outline: none;
            background-color: transparent;
            border-bottom: 1px solid rgba(0, 0, 0, 0.267);
        }
        input:focus { border-color: #007bff; }

        input::placeholder { 
            color: rgba(0, 0, 0, 0.555);
        }
        button {
            width: 100%;
            padding: 10px;
            background: #25723f;
            color: rgb(248, 248, 248);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
        button:hover { background: #25723f; }
        .toggle-text {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
        }
        .toggle-text span { color: #0031b9; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }      
    </style>
</head>
<body>
<div class="uni-modal">
    <img src="Assets/cross-icon.svg" class="uni-modal-icon"><h4 class="uni-modal-message">Please fill up all fields.</h4>
</div>

<div class="form-container">
    <div id="login-section">
        <h2>Login</h2>
        <form id="login-form">
            <div class="form-group">
                <input type="text" placeholder="Enter username" name="username">
            </div>
            <div class="form-group">
                <input type="password" placeholder="Enter password" name="password">
            </div>
            <input type="hidden" name="type" value="login">
            <button type="submit">Login</button>
        </form>
        <p class="toggle-text">New here? <span onclick="toggleForms()">Register</span></p>
    </div>
    <div id="register-section" class="hidden">
        <h2>Register</h2>
        <form id="register-form">
            <div class="form-group">
                <input type="text" placeholder="Choose a username" name="username">
            </div>
            <div class="form-group">
                <input type="text" placeholder="email@example.com" name="email">
            </div>
            <div class="form-group">
                <input type="password" id="reg-password" placeholder="Enter Password" name="password">
            </div>
            <div class="form-group">
                <input type="password" id="confirm-password" placeholder="Repeat password" name="confirm-password">
            </div>
            <input type="hidden" name="type" value="register">
            <button type="submit">Create Account</button>
        </form>
        <p class="toggle-text">Already have an account? <span onclick="toggleForms()">Login</span></p>
    </div>
</div>

<script src="modal.js"></script>

<script>
    fetch('check_session.php').then(response => response.json()).then(loggedIn => {
        if(loggedIn.loggedIn) window.location.replace('homepage.html')})
        .catch((error) => console.error(error));
    
    const formGroupInput = document.querySelectorAll('.form-group input');

    function toggleForms() {
        document.getElementById('login-section').classList.toggle('hidden');
        document.getElementById('register-section').classList.toggle('hidden');
        formGroupInput.forEach(input => input.value = '');
    }

    const formContainer = document.querySelector('.form-container')
    const regForm = document.getElementById('register-form');
    const loginForm = document.getElementById('login-form');
    regForm.addEventListener('submit', formValidate);
    loginForm.addEventListener('submit', formValidate);

    function formValidate(e) {
        e.preventDefault();

        const formData = new FormData(this);
        fetch('login.php', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {

            showModal(data.status, data.message);

            if(data.status === 'logged') {
                formContainer.setAttribute('inert', '')
                setTimeout(() => window.location.replace('homepage.html'), 2000);
            }
            else if(data.status === 'registered') {
                toggleForms();
            }

        }).catch(() => alert('Error. Please try again.'));
    }
</script>

</body>
</html>
