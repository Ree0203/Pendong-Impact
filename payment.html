<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy dash 3 coins</title>

    <link rel="stylesheet" href="payment.css">
</head>
<body>
    <div class="background">
        <span class="title">Pendong Impact: Transaction Hub</span>
        <hr>
        <div class="x-icon">
            <button class="x-button" id="x-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M504.6 148.5C515.9 134.9 514.1 114.7 500.5 103.4C486.9 92.1 466.7 93.9 455.4 107.5L320 270L184.6 107.5C173.3 93.9 153.1 92.1 139.5 103.4C125.9 114.7 124.1 134.9 135.4 148.5L278.3 320L135.4 491.5C124.1 505.1 125.9 525.3 139.5 536.6C153.1 547.9 173.3 546.1 184.6 532.5L320 370L455.4 532.5C466.7 546.1 486.9 547.9 500.5 536.6C514.1 525.3 515.9 505.1 504.6 491.5L361.7 320L504.6 148.5z"/></svg>            
            </button>
        </div>
        <div class="currency-container">
            <div class="currency" id="cvsu-coins">
                <div class="image1"><img src="Assets/cvsu-icon.png" alt="cvsu-icon" class="icon-cvsu1"></div>
                <div class="amount" id="cvsu-coins-amount-payment"></div>
            </div>
            <div class="currency" id="3-coins">
                <div class="image2"><img src="Assets/3-icon.png" alt="3-coin" class="icons1"></div>
                <div class="amount" id="3-coins-amount"></div>
            </div>
        </div>


        <div class="confirmation-window-container" id="confirm-container">
            <div class="confirmation-inner-container">
                <span id="confirmation-title">Pay</span>
                <div class="product">
                    <div class="hero-product">
                        <span class="product-title">Product</span>
                        <img src="Assets/3-icon.png" alt="">
                        <span class="product-description" id="product-description">100 DASH 3 coins</span>
                    </div>
                    <div class="product-price" id="product-price">
                        ₱50
                    </div>
                </div>
                <div class="payment-type-container">
                    <span>Select payment type</span>
                    <div class="button-container">
                        <button class="payment-type-buttons" id="tuwad">Tuwad</button>
                        <button class="payment-type-buttons" id="kantot">Kantot</button>
                        <button class="payment-type-buttons" id="tumbong">Tumbong</button>
                    </div>
                </div>
                <div class="confirm-button" id="purchase-button">
                    <button class="confirm" id="confirmButton">Confirm</button>
                </div>
            </div>
        </div>

        <div class="payment-container">
            <div id="coins100" class="exchange" data-coins="100" data-price="50">
                <div class="inner-container">
                    <img src="Assets/3-icon.png" alt="">
                    <span class="price">100 DASH 3 coins</span>
                    <div class="exchange-title">₱50</div>
                </div>
            </div>
            <div id="coins500" class="exchange" data-coins="500" data-price="250">
                <div class="inner-container">
                    <img src="Assets/3-icon.png" alt="">
                    <span class="price">500 DASH 3 coins</span>
                    <div class="exchange-title">₱250</div>
                </div>
            </div>
            <div id="coins1000" class="exchange" data-coins="1000" data-price="500">
                <div class="inner-container">
                    <img src="Assets/3-icon.png" alt="">
                    <span class="price">1000 DASH 3 coins</span>
                    <div class="exchange-title">₱500</div>
                </div>
            </div>
            <div id="coins1600" class="exchange" data-coins="1600" data-price="800">
                <div class="inner-container">
                    <img src="Assets/3-icon.png" alt="">
                    <span class="price">1600 DASH 3 coins</span>
                    <div class="exchange-title">₱800</div>
                </div>
            </div>
            <div id="coins5000" class="exchange" data-coins="5000" data-price="2500">
                <div class="inner-container">
                    <img src="Assets/3-icon.png" alt="">
                    <span class="price">5000 DASH 3 coins</span>
                    <div class="exchange-title">₱2500</div>
                </div>
            </div>
            <div id="coins12000" class="exchange" data-coins="12000" data-price="6000">
                <div class="inner-container">
                    <img src="Assets/3-icon.png" alt="">
                    <span class="price">12000 DASH 3 coins</span>
                    <div class="exchange-title">₱6000</div>
                </div>
            </div>
        </div>
    </div>


    <script src="payment.js"></script>
</body>
</html>
