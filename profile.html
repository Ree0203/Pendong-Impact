<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="modal.css">
</head>
<body>
    <header>
        <h1>Profile</h1>

        <div class="x-icon">
            <button class="x-button" id="x-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <line x1="4" y1="4" x2="20" y2="20" stroke="#00753d" stroke-width="3.5" stroke-linecap="round" />
                <line x1="20" y1="4" x2="4" y2="20" stroke="#00753d" stroke-width="3.5" stroke-linecap="round" />
            </svg>            
            </button>
        </div>
    </header>
    <main>
        <div class="uni-modal">
            <img src="Assets/cross-icon.svg" class="uni-modal-icon"><h4 class="uni-modal-message">Please fill up all fields.</h4>
        </div>
        
        <section class="main-left">
            <div class="profile">
                <div class="profile-pic">

                </div>
                
                <div class="profile-info">

                    <h1 id="username"></h1>
                    <div class="profile-info-secondary">
                        <h3>UserID</h3>
                        <h2 id="user-id"></h2>

                        <h3>Date Joined</h3>
                        <h2 id="date-joined"></h2>
                    </div>

                </div>
            </div>

            <div class="profile-stats-container">

                <div class="profile-stats">
                    <h2>Students <span id="number-of-students"></span></h2>
                    <h2>Wins <span id="wins"></span></h2>
                    <h2>Loses <span id="loses"></span></h2>
                </div>

            </div>

            <div class="student-showcase">

                <div class="student-showcase-top">
                    <h2>Student Showcase</h2>
                </div>
                <div>
                    <div class="student-showcase-down">
                        <div>

                        </div>
                        <div>
                            
                        </div>
                        <div>
                            
                        </div>
                        <div>
                            
                        </div>
                        <div>
                            
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <section class="main-right">
            <textarea id="message-box" maxlength="200" spellcheck="false" disabled></textarea>
        </section>
    </main>
    <div class="overlay">
        <div class="overlay-box">
            <h1>Change Profile</h1>
            <div class="overlay-menu">
                <div class="overlay-menu-left">
                    <div class="overlay-menu-students-square-container">                   
                        <div class="overlay-menu-student-square" id="default" data-owned="true">
                            <img src="Assets/lock-icon.svg" class="student-lock-icon">
                        </div>

                    </div>
                </div>
                <div class="overlay-menu-right">
                    <div class="preview-picture">

                    </div>
                    <h2 class="preview-name">
                        Chlowen Patambang
                    </h2>
                </div>
            </div>
            <div class="overlay-menu-buttons">
                <button id="cancel-button">Cancel</button>
                <button id="confirm-button">Confirm</button>
            </div>
        </div>
    </div>

    <script src="modal.js"></script>
    <script>
        fetch('check_session.php', {method: 'POST'}).then(response => response.json()).then(loggedIn => {
            if(!loggedIn.loggedIn) window.location.replace('login.html')})
        .catch((error) => console.error(error));


        let sessionId;

        getSessionInfo();
        async function getSessionInfo() {
            const response = await fetch('get_session_data.php', {method: 'POST'});
            const data = await response.json();

            sessionId = data.userId;
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id') ?? sessionId;
            getAccountInfo(userId);
        }

        


        let allCharacters;
        let favorites;
        let message;
        
        async function getAccountInfo(userId) {
            const response1 = await fetch('get_account.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userId: userId})
            });
            const account = await response1.json();
            message = account.message;
            
            const response2 = await fetch('get_inventory.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userId: userId})
            });
            const data2 = await response2.json();
            const owned = data2.owned;
            const unowned = data2.unowned;
            allCharacters = [...owned, ...unowned];

            const response3 = await fetch('get_account_favorites.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userId: userId})
            });
            favorites = await response3.json();

            displayAccountInfo(account, owned, favorites);
            document.title = `${account.username}${(account.username.endsWith('s')) ? "'" : "'s"} Profile`;

            if(sessionId === userId) {
            setupOverlayMenu(allCharacters, owned);
            profilePic.classList.add('change');
            profilePic.addEventListener('click', changeProfilePicture);
            studentShowcaseBoxes.forEach(box => box.addEventListener('click', changeStudentFavorites));
            studentShowcaseDown.classList.add('change');
            messageBox.addEventListener('blur', saveMessage);
            messageBox.classList.add('change');
            messageBox.disabled = false;
            document.title = 'Your Profile';
            }
        }



        const profilePic = document.querySelector('.profile-pic');
        const username = document.getElementById('username');
        const userIdDisplay = document.getElementById('user-id');
        const dateJoined = document.getElementById('date-joined');
        const numOfStudents = document.getElementById('number-of-students');
        const wins = document.getElementById('wins');
        const loses = document.getElementById('loses');
        const messageBox = document.getElementById('message-box');
        const studentShowcaseDown = document.querySelector('.student-showcase-down');
        const studentShowcaseBoxes = document.querySelectorAll('.student-showcase-down div');
        let profileCharId;

        function displayAccountInfo(account, accountInv, favorites) {
            profilePic.style.backgroundImage = `url('Assets/${account.profile_pic}')`;
            username.textContent = account.username;
            userIdDisplay.textContent = 202600569810 + account.user_id;
            dateJoined.textContent = account.date_created;
            numOfStudents.textContent = accountInv.length;
            wins.textContent = account.wins;
            loses.textContent = account.loses;
            messageBox.value = account.message;

            for(let i = 0; i < favorites.length; i++) {
                const character = accountInv.find(char => char.character_id == favorites[i]);
                studentShowcaseBoxes[i].style.backgroundImage = `url('Assets/${character.picture}')`;
            }

            const profileChar = accountInv.find(char => char.picture == account.profile_pic);
            profileCharId = profileChar ? profileChar.character_id : 'default';
        }


        const overlay = document.querySelector('.overlay');
        const overlayBoxTitle = document.querySelector('.overlay-box h1');
        const overlayStudentSquaresContainer = document.querySelector('.overlay-menu-students-square-container')
        const overlayStudentSquareOrig = document.querySelector('.overlay-menu-student-square');
        const previewPicture = document.querySelector('.preview-picture');
        const previewName = document.querySelector('.preview-name');
        let overlayStudentSquares;
        let overlayStudentSquaresUnowned;

        function setupOverlayMenu(characters, owned) {
            characters = characters.sort((a, b) => a.character_id - b.character_id);

            for(let i = 0; i < characters.length; i++) {
                const studentSquareCopy = overlayStudentSquareOrig.cloneNode(true);
                studentSquareCopy.id = characters[i].character_id
                studentSquareCopy.style.backgroundImage = `url('Assets/${characters[i].picture}')`

                if(owned.find(char => char == characters[i])) {
                    studentSquareCopy.dataset.owned = 'true';
                }
                else {
                    studentSquareCopy.dataset.owned = 'false';
                }

                overlayStudentSquaresContainer.append(studentSquareCopy);
            }

            overlayStudentSquares = document.querySelectorAll('.overlay-menu-student-square');
            overlayStudentSquaresUnowned = document.querySelectorAll(".overlay-menu-student-square[data-owned='false']")

            for(const unownedStudent of overlayStudentSquaresUnowned) {
                const lock = unownedStudent.querySelector('.student-lock-icon');
                lock.style.display = 'inline';
            }
        }

        const confirmButton = document.getElementById('confirm-button');
        const cancelButton = document.getElementById('cancel-button');
        let profilePicTemp;

        function changeProfilePicture() {
            overlay.style.display = 'flex';
            overlayBoxTitle.textContent = 'Change Profile';
            overlayStudentSquareOrig.style.display = 'block';
            overlayStudentSquares.forEach(square => square.classList.remove('click'));
            overlayStudentSquaresUnowned.forEach(square => square.style.display = 'block');
            profilePicTemp = profileCharId;

            if(profileCharId == 'default') {
                overlayStudentSquareOrig.classList.add('click');
                previewPicture.style.backgroundImage = "url('Assets/default-profile.png')"
                previewName.textContent = "Default"
            }
            else {
                const character = allCharacters.find(char => char.character_id == profilePicTemp);
                document.getElementById(profileCharId).classList.add('click');
                previewPicture.style.backgroundImage = `url('Assets/${character.picture}')`;
                previewName.textContent = `${character.first_name} ${character.last_name}`;
            }

            overlayStudentSquares.forEach(square => square.addEventListener('click', profileStudentSquareClick));
            cancelButton.addEventListener('click', cancelButtonClick);
            confirmButton.addEventListener('click', confirmProfilePic);
            
        }

        function profileStudentSquareClick(e) {
            overlayStudentSquares.forEach(square => square.classList.remove('click'));
            e.currentTarget.classList.add('click');
            profilePicTemp = e.currentTarget.id;
            const isOwned = e.currentTarget.dataset.owned;
        
            if(profilePicTemp == 'default') {
                previewPicture.style.backgroundImage = "url('Assets/default-profile.png')"
                previewName.textContent = "Default"
            }
            else {
                const character = allCharacters.find(char => char.character_id == profilePicTemp);
                previewPicture.style.backgroundImage = `url('Assets/${character.picture}')`;
                previewName.textContent = `${character.first_name} ${character.last_name}`;
            }

            if(isOwned == 'true') {
                confirmButton.classList.remove('blocked');
                confirmButton.addEventListener('click', confirmProfilePic);
            }
            else {
                confirmButton.classList.add('blocked');
                confirmButton.removeEventListener('click', confirmProfilePic);
            }
            
        }

        function cancelButtonClick() {
            overlayStudentSquares.forEach(square => square.removeEventListener('click', profileStudentSquareClick));
            overlayStudentSquares.forEach(square => square.removeEventListener('click', favoriteStudentSquareClick));
            confirmButton.removeEventListener('click', confirmProfilePic);
            confirmButton.removeEventListener('click', confirmFavoriteStudents);
            overlay.style.display = 'none';
        }

        async function confirmProfilePic() {
            const character = allCharacters.find(char => char.character_id == profilePicTemp);
            const characterPicture = character ? character.picture : 'default-profile.png';
            
            const response = await fetch('change_profile_picture.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({profilePicture: characterPicture})
            });
            const data = await response.json();

            if(data.status == 'success') {
                showModal('success', 'Profile Picture changed.')
                profileCharId = profilePicTemp;
                profilePic.style.backgroundImage = `url('Assets/${characterPicture}')`;
                cancelButtonClick();
            }
        }


        let clickedNum;
        let favoritesTemp;
        function changeStudentFavorites() {
            clickedNum = 0;
            overlay.style.display = 'flex';
            overlayBoxTitle.textContent = 'Choose Students to Showcase'
            overlayStudentSquareOrig.style.display = 'none';
            overlayStudentSquares.forEach(square => square.classList.remove('click'));
            overlayStudentSquaresUnowned.forEach(square => square.style.display = 'none');
            previewPicture.style.backgroundImage = '';
            previewName.textContent = '';
            favoritesTemp = [...favorites];

            for(let i = 0; i < favorites.length; i++) {
                const studentSquare = document.getElementById(favorites[i]);
                studentSquare.classList.add('click');
                clickedNum++;
            }

            overlayStudentSquares.forEach(square => square.addEventListener('click', favoriteStudentSquareClick));
            cancelButton.addEventListener('click', cancelButtonClick);
            confirmButton.addEventListener('click', confirmFavoriteStudents);
        }

        function favoriteStudentSquareClick(e) {
            const targetStudent = e.currentTarget;
            const targetStudentId = Number(targetStudent.id);
            const character = allCharacters.find(char => char.character_id == targetStudentId);

            if(targetStudent.classList.contains('click')) {
                targetStudent.classList.remove('click');
                clickedNum--;
                favoritesTemp = favoritesTemp.filter(favorite => favorite != targetStudentId);

            }
            else if (!targetStudent.classList.contains('click') && clickedNum < 5) {
                targetStudent.classList.add('click');
                clickedNum++;
                favoritesTemp.push(targetStudentId);
            }
            
            previewPicture.style.backgroundImage = `url('Assets/${character.picture}')`;
            previewName.textContent = `${character.first_name} ${character.last_name}`;
        }

        async function confirmFavoriteStudents() {
            const response = await fetch('change_favorites.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(favoritesTemp)
            });
            const data = await response.json();
            
            if(data.status == 'success') {
                showModal('success', 'Student Showcase updated.')
                favorites = favoritesTemp;
                for(let i = 0; i < studentShowcaseBoxes.length; i++) {
                    const character = allCharacters.find(char => char.character_id == favorites[i]);

                    if(character) {
                        studentShowcaseBoxes[i].style.backgroundImage = `url('Assets/${character.picture}')`;
                    }
                    else {
                        studentShowcaseBoxes[i].style.backgroundImage = '';
                    }
                    
                }
                cancelButtonClick();
            }

        }

        async function saveMessage() {

            if(message != messageBox.value) {
                const response = await fetch('change_profile_message.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: messageBox.value})
                });
                const data = await response.json();
                
                if(data.status == 'success') {
                    showModal('success', 'Profile Message changed.')
                    message = messageBox.value;
                }
            }

        }

        const xButton = document.getElementById("x-icon"); 

        xButton.addEventListener("click", function() { 
            window.history.back(); 
        });

        window.addEventListener('pageshow',(e) => {
            if (e.persisted) window.location.reload();
        });

    </script>
</body>
</html>
