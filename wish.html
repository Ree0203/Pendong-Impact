<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="wish.css">
    <title>Pull for characters</title>
</head>
<body>

    <div class="banner-container">
        <div class="banner-box" id="jayson">
            <img src="Assets/jayson.png" alt="" id="hero-icon-jayson" class="hero-icons">
        </div>
        <div class="banner-box" id="demy">
            <img src="Assets/demy.png" alt="" id="hero-icon-demy" class="hero-icons">
        </div>
        <div class="banner-box" id="james">
            <img src="Assets/james.png" alt="" id="hero-icon-james" class="hero-icons">
        </div>
    </div>

    <div class="currency-container">
        <div class="currency" id="cvsu-coins">
            <div class="image1"><img src="Assets/cvsu-icon.png" alt="cvsu-icon" class="icon-cvsu"></div>
            <div class="amount" id="cvsu-coins-amount"></div>
        </div>
        <div class="currency" id="3-coins">
            <div class="image2"><img src="Assets/3-icon.png" alt="3-coin" class="icons1"></div>
            <div class="amount" id="3-coins-amount"></div>
        </div>
    </div>
    <div id="selected-banner">

    </div>

    <div class="detail-buttons-container">
        <button class="detail-buttons" id="shop">Shop</button>
        <button class="detail-buttons" id="details">Details</button>
        <button class="detail-buttons" id="pity">Pity</button>
    </div>

    <div class="wish-buttons-container">
        <button class="wish-buttons">
            Wish x1
            <div class="wish-button-icon" style="display: flex; justify-content: center; align-items: center;">
                <img src="Assets/cvsu-icon.png" alt="" class="icon-cvsu">x1
            </div>
        </button>
        <button class="wish-buttons">
            Wish x10
            <div class="wish-button-icon" style="display: flex; justify-content: center;align-items: center;">
                <img src="Assets/cvsu-icon.png" alt="" class="icon-cvsu">x10
            </div>
        </button>
    </div>

    <script src="wish.js"></script>
</body>
</html>
