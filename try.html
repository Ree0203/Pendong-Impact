<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-image: url(Assets/pendong.png);
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: rgb(238, 243, 241);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #555; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #bce2c5;
            border-radius: 5px;
            outline: none;
        }
        input:focus { border-color: #007bff; }
        
        .error-msg {
            color: #ff4d4d;
            font-size: 0.75rem;
            display: none; 
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #25723f;
            color: rgb(248, 248, 248);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
        button:hover { background: #25723f; }
        .toggle-text {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
        }
        .toggle-text span { color: #0031b9; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="form-container">
    <div id="login-section">
        <h2>Login</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password" required minlength="8" maxlength="16">
            </div>
            <button type="submit">Login</button>
        </form>
        <p class="toggle-text">New here? <span onclick="toggleForms()">Register</span></p>
    </div>
    <div id="register-section" class="hidden">
        <h2>Register</h2>
        <form id="register-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Enter Password" required minlength="8" maxlength="16">
                <span id="length-error" class="error-msg">Password must be 8-16 characters.</span>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Repeat password" required>
                <span id="match-error" class="error-msg">Passwords do not match!</span>
            </div>
            <button type="submit">Create Account</button>
        </form>
        <p class="toggle-text">Already have an account? <span onclick="toggleForms()">Login</span></p>
    </div>
</div>

<script>
    function toggleForms() {
        document.getElementById('login-section').classList.toggle('hidden');
        document.getElementById('register-section').classList.toggle('hidden');
    }

    const regForm = document.getElementById('register-form');
    
    regForm.onsubmit = function(e) {
        const pass = document.getElementById('reg-password').value;
        const confirm = document.getElementById('confirm-password').value;
        
        const lengthError = document.getElementById('length-error');
        const matchError = document.getElementById('match-error');

        lengthError.style.display = "none";
        matchError.style.display = "none";

        let isValid = true;

        if (pass.length < 8 || pass.length > 16) {
            lengthError.style.display = "block";
            isValid = false;
        }

        if (pass !== confirm) {
            matchError.style.display = "block";
            isValid = false;
        }

        if (!isValid) {
            e.preventDefault(); 
        } else {
            alert("Registration successful!");
        }
    };
</script>

</body>
</html>
