<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pendong Impact - Green Edition</title>
  
  <link rel="stylesheet" href="homepage_style.css" />
  
</head>
<body>

  <div id="bg"></div>

  <div id="profile-widget">
    <div class="profile-card">
      <div class="profile-avatar">
        <img src="Assets/profile.jpg" alt="Profile">
      </div>
      <div class="profile-info">
        <div class="profile-name">Brostic</div>
        <div class="profile-id">202403622</div>
      </div>
      <div class="hamburger-btn" id="hamburger-btn">
        <span></span>
        <span></span>
        <span></span>
      </div>

      
    </div>
    <div class="drop-down">
      <div class="drop-down-element" id="profile">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
          <!-- Transparent background to keep it versatile -->
          <rect width="100" height="100" fill="none"/>
          
          <!-- Head (Using an oval/ellipse path instead of a circle) -->
          <path d="M50,15 C40,15 34,21 34,32 C34,43 40,49 50,49 C60,49 66,43 66,32 C66,21 60,15 50,15 Z" fill="#4CAF50"/>
          
          <!-- Shoulders / Torso -->
          <path d="M18,80 C18,60 32,56 50,56 C68,56 82,60 82,80 C82,85 75,85 50,85 C25,85 18,85 18,80 Z" fill="#4CAF50"/>
        </svg> 
        <span>Profile</span>
      </div>
      <div class="drop-down-element" id="account-settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%">
          <!-- Outer Cog Path -->
          <path 
            d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65z" 
            fill="#2a9d8f" 
            filter="url(#gear-shadow)"
          />
          <!-- Inner Cutout Circle -->
          <circle cx="12" cy="12" r="3" fill="#ffffff" />
        </svg>
        <span>Settings</span>
      </div>
      <div class="drop-down-element" id="logout">
        <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="#2a9d8f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-log-out">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" filter="url(#logout-shadow)"></path>
          <polyline points="16 17 21 12 16 7" filter="url(#logout-shadow)"></polyline>
          <line x1="21" y1="12" x2="9" y2="12" filter="url(#logout-shadow)"></line>
        </svg>
        <span>Log-out</span>
      </div>
    </div>
    <div class="profile-sub"></div>
  </div>

  
  <div id="left-side-icons">
    <div class="side-icon">
      <div class="side-icon-box">
        <img src="assets/profile.jpg" alt="Notice Icon">
      </div>
      <div class="side-icon-label">Notice</div>
    </div>
    <div class="side-icon">
      <div class="side-icon-box">
        <img src="Assets/profile.jpg" alt="Tasks Icon">
      </div>
      <div class="side-icon-label">Tasks</div>
    </div>
    <div class="side-icon">
      <div class="side-icon-box">
        <img src="assets/profile.jpg" alt="Pyroxene Icon">
      </div>
      <div class="side-icon-label">Pyroxene</div>
    </div>
  </div>

  <div id="resources">
    <div class="ba-currency-bar gem-bar" title="Pyroxene">
      <div class="ba-icon">
        <img src="assets/profile.jpg" alt="Profile">
      </div>
      <div class="ba-num" id="gems">100</div>
      <div class="ba-add">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100" height="100">
          <path 
            d="M12 5V19M5 12H19" 
            stroke="#FFFFFF" 
            stroke-width="2.5" 
            stroke-linecap="round" 
            stroke-linejoin="round"
          />
        </svg>
      </div>
    </div>
    <div class="ba-currency-bar coin-bar" title="Credits">
      <div class="ba-icon">
        <img src="Assets/profile.jpg" alt="Profile">
      </div>
      <div class="ba-num" id="coins">100</div>
      <div class="ba-add">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100" height="100">
          <path 
            d="M12 5V19M5 12H19" 
            stroke="#FFFFFF" 
            stroke-width="2.5" 
            stroke-linecap="round" 
            stroke-linejoin="round"
          />
        </svg>
      </div>
    </div>
  </div>

  <div id="bottom-hud-layer">
    <div id="banner-area">
      <div class="banner-frame" title="Current Event">
        <img class="banner-img" src="Assets/banner.jpg" alt="Event Banner Placeholder" />
      </div>
    </div>
    
    <div id="pvp-battle-btn-area">
      <div class="pvp-battle-btn">
        <div class="folder-top">
          <span class="folder-symbols">△ × ＋ ○</span>
          <div class="folder-red-dot"></div>
        </div>
        <div class="folder-body">
          <img src="Assets/profile.jpg" alt="PVP BATTLE Icon" class="pvp-battle-icon">
        </div>
        <div class="pvp-battle-tag">Season in Progress</div>
        <div class="pvp-battle-label-bar">PVP BATTLE</div>
      </div>
    </div>
  </div>

  <nav id="bottom-nav">
    <div class="ba-nav-inner">
      <div class="nav-items">
        <div class="nav-item active">
          <div class="nav-icon">
            <img src="Assets/profile.jpg" alt="Profile">
          </div>
          <div class="nav-label">Profile</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24">
              <path d="M12 2C12 7.5 16.5 12 22 12C16.5 12 12 16.5 12 22C12 16.5 7.5 12 2 12C7.5 12 12 7.5 12 2Z"></path>
            </svg>
          </div>
          <div class="nav-label">Gacha</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24">
              <rect x="4" y="9" width="16" height="13" rx="2" ry="2"></rect>
              <path d="M8 9V7a4 4 0 0 1 8 0v2"></path>
              <line x1="12" y1="13" x2="12" y2="17"></line>
              <line x1="10" y1="15" x2="14" y2="15"></line>
            </svg>
          </div>
          <div class="nav-label">Inventory</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon"> 
            <svg viewBox="0 0 24 24">
              <path d="M3 3h18v4H3z"></path>
              <path d="M4 7l2 14h12l2-14"></path>
              <path d="M9 11v4"></path>
              <path d="M15 11v4"></path>
            </svg>
          </div>
          <div class="nav-label">Shop</div>
        </div>
      </div>
      <div class="nav-right">
        <div class="nav-symbols">△ × ＋ ○</div>
        <div id="clock">1:40 PM</div>
      </div>
    </div>
  </nav>

  <script src="homepage.js"></script>
</body>
</html>
